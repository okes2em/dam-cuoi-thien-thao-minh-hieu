<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiên Thảo & Minh Hiếu</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <div class="overlay">
        <h1>Thiên Thảo ❤ Minh Hiếu</h1>
        <p>01.01.2027</p>
        <a href="#countdown" class="btn">Mở thiệp cưới</a>
    </div>
</header>

<section id="countdown">
    <h2>Đếm ngược ngày cưới</h2>
    <div id="timer"></div>
</section>

<section class="couple">
    <div class="person">
        <img src="images/bride.jpg">
        <h3>Thiên Thảo</h3>
    </div>

    <div class="person">
        <img src="images/groom.jpg">
        <h3>Minh Hiếu</h3>
    </div>
</section>

<section class="gallery">
    <h2>Album Ảnh</h2>

    <div class="gallery-grid">
        <img src="images/gallery1.jpg">
        <img src="images/gallery2.jpg">
        <img src="images/gallery3.jpg">
    </div>
</section>

<section class="timeline">
    <h2>Hành Trình Tình Yêu</h2>

    <div class="item">
        <h3>2022</h3>
        <p>Lần đầu gặp nhau</p>
    </div>

    <div class="item">
        <h3>2023</h3>
        <p>Bắt đầu yêu</p>
    </div>

    <div class="item">
        <h3>2026</h3>
        <p>Đính hôn</p>
    </div>

    <div class="item">
        <h3>2027</h3>
        <p>Kết hôn</p>
    </div>
</section>

<section class="location">
    <h2>Địa Điểm</h2>

    <p>
        Thôn Xuân Đài<br>
        Xã An Trường<br>
        TP Hải Phòng
    </p>

    <a class="btn"
       target="_blank"
       href="https://maps.google.com">
       Chỉ Đường
    </a>
</section>

<footer>
    Thiên Thảo ❤ Minh Hiếu - 2027
</footer>

<script src="script.js"></script>
</body>
</html>
